version: 2

project_name: ccrawl

before:
  hooks:
    - go mod tidy

builds:
  - id: ccrawl
    main: ./cmd/ccrawl
    binary: ccrawl
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/tamnd/ccrawl-cli/cli.Version={{.Version}}
      - -X github.com/tamnd/ccrawl-cli/cli.Commit={{.ShortCommit}}
      - -X github.com/tamnd/ccrawl-cli/cli.Date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: ccrawl
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: tamnd
    name: ccrawl-cli
  draft: false
  prerelease: auto
